      <script>
        document.addEventListener('DOMContentLoaded', () => {
          if (typeof gsap !== 'undefined') {
            const tl = gsap.timeline();
            tl.to('#splash-title', { opacity: 1, y: 0, duration: 1, delay: 0.5, ease: 'power2.out' });
            tl.to('#splash-presente', { opacity: 1, y: 0, duration: 0.8, ease: 'power2.out' }, "-=0.3");
            tl.to('#lariya-simple-splash', { opacity: 0, duration: 1, delay: 1.5, pointerEvents: 'none', onComplete: () => {
              const el = document.getElementById('lariya-simple-splash');
              if(el) el.remove();
            }});
          }
        });
      </script>

      <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('onto-menu-trigger');
            const closeBtn = document.getElementById('lariya-menu-close');
            const overlay = document.getElementById('lariya-menu-overlay');

            if(openBtn && overlay) {
                openBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    overlay.style.display = 'block';
                    gsap.to(overlay, { clipPath: 'inset(0% 0% 0% 0%)', duration: 0.6, ease: 'power3.inOut' });
                });

                closeBtn.addEventListener('click', () => {
                    gsap.to(overlay, { 
                        clipPath: 'inset(0% 0% 100% 0%)', 
                        duration: 0.6, 
                        ease: 'power3.inOut',
                        onComplete: () => { overlay.style.display = 'none'; }
                    });
                });
            }
        });
      </script>
