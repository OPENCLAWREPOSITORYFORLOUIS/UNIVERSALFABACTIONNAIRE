      <script>
        document.addEventListener('DOMContentLoaded', () => {
            const openBtn = document.getElementById('onto-menu-trigger');
            const closeBtn = document.getElementById('lariya-menu-close');
            const overlay = document.getElementById('lariya-menu-overlay');

            if(openBtn && overlay) {
                openBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    overlay.style.display = 'block';
                    gsap.to(overlay, { clipPath: 'inset(0% 0% 0% 0%)', duration: 0.6, ease: 'power3.inOut' });
                });

                closeBtn.addEventListener('click', () => {
                    gsap.to(overlay, { 
                        clipPath: 'inset(0% 0% 100% 0%)', 
                        duration: 0.6, 
                        ease: 'power3.inOut',
                        onComplete: () => { overlay.style.display = 'none'; }
                    });
                });
            }
        });
      </script>
