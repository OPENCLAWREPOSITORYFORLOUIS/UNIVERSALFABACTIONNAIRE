<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Universal Fab - Prototype 06 (Duotone Vision)</title>
    <link rel="stylesheet" href="base.css">
    <style>
        body { background-color: #000; padding: 0; }
        .page { background: #000; color: #fff; border-bottom: 2px solid #0E1A2C; overflow: hidden; }
        .duotone-split { display: grid; grid-template-columns: 1fr 1fr; height: 100%; border: 40px solid #0E1A2C; }
        .title-duo { font-size: 100px; font-weight: 800; color: #fff; mix-blend-mode: overlay; line-height: 0.8; }
        .box-info { padding: 40px; background: #0E1A2C; color: #fff; }
    </style>
</head>
<body>

    <!-- PAGE 01: COVER -->
    <section class="page" id="p6-1">
        <div class="duotone-split">
            <div style="padding: 80px; display: flex; flex-direction: column; justify-content: center;">
                <h1 class="title-duo">DUO<br>TONE.</h1>
            </div>
            <div class="image-container">
                <img src="../studio-onto.com/img/vault.jpg" alt="Vault" class="lut-duotone">
            </div>
        </div>
    </section>

    <!-- PAGE 02: STORY -->
    <section class="page" id="p6-2">
        <div class="duotone-split" style="grid-template-columns: 1.5fr 1fr;">
            <div class="image-container">
                <img src="../studio-onto.com/img/floral.jpg" alt="Floral" class="lut-duotone">
            </div>
            <div style="padding: 60px; display: flex; flex-direction: column; justify-content: center;">
                <h2 style="font-size: 40px; font-weight: 800;">L'HISTOIRE.</h2>
                <p style="margin-top: 30px; opacity: 0.7;">Un rêve. Un combat. Une industrie.</p>
            </div>
        </div>
    </section>

    <!-- PAGE 03: JALONS -->
    <section class="page" id="p6-3">
        <div class="duotone-split">
             <div style="padding: 80px;">
                <h1 class="title-duo" style="font-size: 60px;">2024<br>LAUNCH.</h1>
             </div>
             <div class="image-container">
                <img src="../studio-onto.com/img/microsoft.jpg" alt="R&D" class="lut-duotone">
             </div>
        </div>
    </section>

    <!-- PAGE 04: VISION -->
    <section class="page" id="p6-4">
        <div class="flex-center" style="padding: 100px;">
             <h1 class="title-duo" style="font-size: 150px; text-align: center;">VALEUR<br>TOTALE.</h1>
        </div>
    </section>

    <!-- PAGE 05: RESTOS -->
    <section class="page" id="p6-5">
        <div class="duotone-split">
            <div class="image-container">
                <img src="../studio-onto.com/img/vault2.jpg" alt="Resto" class="lut-duotone">
            </div>
            <div class="box-info">
                 <h2 style="font-size: 40px;">LES 50.</h2>
                 <p style="margin-top: 20px;">Réseau mobile stratégique.</p>
            </div>
        </div>
    </section>

    <!-- PAGE 06: INVEST -->
    <section class="page flex-center" id="p6-6">
        <h1 class="title-duo" style="font-size: 200px;">20%</h1>
    </section>

    <!-- PAGE 07: HOMES -->
    <section class="page" id="p6-7">
        <div class="duotone-split">
             <div class="box-info">
                <h2>HABITAT.</h2>
             </div>
             <div class="image-container">
                <img src="../studio-onto.com/img/floral4.jpg" alt="Home" class="lut-duotone">
             </div>
        </div>
    </section>

    <!-- PAGE 08: MANGUES -->
    <section class="page" id="p6-8">
        <div class="flex-center" style="padding: 80px;">
             <h1 class="title-duo" style="font-size: 80px;">80 000 T.</h1>
        </div>
    </section>

    <!-- PAGE 09: TRACTEURS -->
    <section class="page" id="p6-9">
        <div class="duotone-split">
             <div class="image-container">
                <img src="../studio-onto.com/img/microsoft3.jpg" alt="Agri" class="lut-duotone">
             </div>
             <div class="box-info">
                <h2>FORGE.</h2>
             </div>
        </div>
    </section>

    <!-- PAGE 10: BACK -->
    <section class="page flex-center" id="p6-10">
        <h1 class="title-duo" style="font-size: 40px;">UNIVERSAL FAB v.06</h1>
    </section>

</body>
</html>
